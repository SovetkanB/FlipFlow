services:
  postgres:
    image: postgres:16-alpine
    container_name: flipflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-flipper}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flipper}
      POSTGRES_DB: ${DB_NAME:-flipflow}
    ports:
      - "45432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-flipper}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: